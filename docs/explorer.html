<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BitBudCoin Explorer</title>

<style>

body{
    margin:0;
    background:#070707;
    color:#eee;
    font-family:Consolas,monospace;
}

header{
    background:#101010;
    border-bottom:2px solid #00ffaa;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 35px;
}

.logoBox{
    display:flex;
    align-items:center;
    gap:15px;
}

.logoImg{
    height:50px;
}

.logoTitle{
    color:#00ffaa;
    font-size:28px;
    font-weight:bold;
}

.logoSub{
    color:#888;
    font-size:13px;
}

.networkBox{
    text-align:right;
    line-height:26px;
}

.networkBox span{
    color:#00ffaa;
    margin-left:10px;
}

main{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
    margin-bottom:30px;
}

.card{
    background:#111;
    border:1px solid #222;
    border-radius:8px;
    padding:18px;
}

.card h3{
    margin:0;
    color:#00ffaa;
    font-size:14px;
}

.card p{
    margin-top:10px;
    font-size:24px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#111;
}

th{
    background:#181818;
    color:#00ffaa;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #222;
}

tr:hover{
    background:#161616;
}

.hash{
    color:#999;
    font-size:13px;
}

</style>

</head>

<body>

<header>

<div class="logoBox">

<img src="logo.png" class="logoImg">

<div>

<div class="logoTitle">
BitBudCoin Explorer
</div>

<div class="logoSub">
Mainnet Candidate
</div>

</div>

</div>

<div class="networkBox">

<div>🌐 Network <span>BitBudCoin</span></div>

<div>🟢 Status <span>ONLINE</span></div>

<div>⛏ Block Time <span>8 min</span></div>

</div>

</header>

<main>

<div class="stats">

<div class="card">
<h3>Height</h3>
<p id="height">0</p>
</div>

<div class="card">
<h3>Difficulty</h3>
<p>4</p>
</div>

<div class="card">
<h3>Reward</h3>
<p>50 BbC</p>
</div>

<div class="card">
<h3>Supply</h3>
<p>2,000,700</p>
</div>

<div class="card">
<h3>Nodes</h3>
<p>1</p>
</div>

</div>

<h2>Ostatnie bloki</h2>

<table id="blocksTable">

<thead>

<tr>

<th>#</th>

<th>Hash</th>

<th>Miner</th>

<th>Reward</th>

<th>Time</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</main>

<script>

const API="http://localhost:5000";

async function loadBlocks(){

try{

const res=await fetch(API+"/blocks");

const blocks=await res.json();

document.getElementById("height").textContent=blocks.length;

const tbody=document.querySelector("#blocksTable tbody");

tbody.innerHTML="";

blocks.slice(-10).reverse().forEach(b=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${b.height}</td>
<td class="hash">${b.hash.substring(0,20)}...</td>
<td>${b.miner.substring(0,16)}...</td>
<td>${b.reward} BbC</td>
<td>${new Date(b.timestamp).toLocaleTimeString()}</td>
`;

tbody.appendChild(tr);

});

}catch(err){

console.log(err);

}

}

loadBlocks();

setInterval(loadBlocks,5000);

</script>

</body>
</html>
