<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BBC Chain Explorer</title>
<style>
    body {
        margin: 0;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: Consolas, "JetBrains Mono", monospace;
    }

    header {
        background: #111;
        padding: 18px 28px;
        border-bottom: 2px solid #222;
        display: flex;
        justify-content: space-between;
        align-items: center;
        letter-spacing: 1px;
    }

    .logo {
        font-size: 22px;
        font-weight: bold;
        color: #00ffaa;
        text-shadow: 0 0 8px #00ffaa;
    }

    .status {
        font-size: 12px;
        color: #888;
    }

    .status span {
        color: #00ff88;
        text-shadow: 0 0 6px #00ff88;
    }

    main {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
        padding: 20px;
    }

    .panel {
        background: #111;
        border: 1px solid #222;
        padding: 16px;
        border-radius: 6px;
        box-shadow: 0 0 12px #000 inset;
    }

    .panel h2 {
        margin: 0 0 12px;
        font-size: 16px;
        color: #00ffaa;
        text-shadow: 0
