<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BBC Miner • vMax Series</title>
<style>
    body {
        margin: 0;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: Consolas, "JetBrains Mono", monospace;
        text-align: center;
    }
    header {
        background: #111;
        padding: 20px;
        border-bottom: 2px solid #222;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .logo { font-size: 24px; color: #00ffaa; font-weight: bold; text-shadow: 0 0 10px #00ffaa; }
    
    main { max-width: 900px; margin: 30px auto; padding: 20px; }
    
    .models {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin: 30px 0;
    }
    
    .model-card {
        background: #111;
        border: 2px solid #222;
        border-radius: 8px;
        padding: 20px;
        transition: all 0.3s;
    }
    .model-card:hover {
        border-color: #00ffaa;
        transform: translateY(-5px);
    }
    .model-card h3 {
        color: #00ffaa;
        margin: 0 0 15px 0;
    }
    .stat { margin: 8px 0; font-size: 14px; }
    .hashrate { font-size: 28px; font-weight: bold; color: #00ffaa; }
    
    button {
        width: 100%;
        padding: 14px;
        background: #00ffaa;
        color: #000;
        border: none;
        font-weight: bold;
        cursor: pointer;
        border-radius: 6px;
        margin-top: 15px;
    }
    button:hover { background: #00dd99; }
    button:disabled { background: #555; cursor: not-allowed; }
    
    #status {
        margin: 20px 0;
        padding: 15px;
        background: #1a1a1a;
        border-radius: 6px;
        min-height: 60px;
    }
    .active { color: #00ff88; animation: pulse 2s infinite; }
    @keyframes pulse { 50% { opacity: 0.6; } }
</style>
</head>
<body>

<header>
    <div class="logo">BBC MINER vMax</div>
    <div><a href="index.html" style="color:#888; text-decoration:none;">← Strona główna</a></div>
</header>

<main>
    <h2>Wybierz model koparki vMax</h2>
    <div class="models" id="modelsContainer"></div>

    <div id="status">Wybierz koparkę i podaj adres portfela aby rozpocząć kopanie</div>

    <input type="text" id="minerAddress" placeholder="Twój adres BBC (np. BbC...)" style="width:80%; padding:12px; background:#111; border:1px solid #333; color:white; border-radius:6px;">
</main>

<script>
const API = "http://localhost:5000";

async function loadModels() {
    const res = await fetch(API + "/miners/models");
    const models = await res.json();
    const container = document.getElementById("modelsContainer");
    container.innerHTML = "";

    models.forEach(model => {
        const card = document.createElement("div");
        card.className = "model-card";
        card.innerHTML = `
            <h3>${model.name}</h3>
            <div class="hashrate">${model.hashRate} H/s</div>
            <div class="stat">Pobór mocy: ${model.power}W</div>
            <div class="stat">Efektywność: ${model.efficiency} J/H</div>
            <div class="stat">Cena: $${model.price}</div>
            <button onclick="startMining('\( {model.id}', ' \){model.name}')">Uruchom ${model.name}</button>
        `;
        container.appendChild(card);
    });
}

async function startMining(modelId, modelName) {
    const address = document.getElementById("minerAddress").value.trim();
    if (!address) {
        alert("Podaj adres portfela!");
        return;
    }

    const status = document.getElementById("status");
    status.innerHTML = `⛏️ <span class="active">${modelName} pracuje...</span>`;

    try {
        const res = await fetch(API + "/mine/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ minerAddress: address, modelId })
        });

        const data = await res.json();
        
        if (data.status === "mined") {
            status.innerHTML = `
                ✅ Sukces!<br>
                Wydobyto blok #${data.blockHeight}<br>
                Nagroda: <b>${data.reward} BBC</b><br>
                Hash: ${data.hash.slice(0, 12)}...
            `;
        }
    } catch (e) {
        status.textContent = "Błąd kopania: " + e.message;
    }
}

// Uruchomienie
loadModels();
</script>

</body>
</html>
