<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>BBC Miner • vMax Series</title>
<style>
    body { margin:0; background:#0a0a0a; color:#e5e5e5; font-family:Consolas, monospace; text-align:center; }
    header { background:#111; padding:20px; border-bottom:2px solid #222; display:flex; justify-content:space-between; }
    .logo { font-size:24px; color:#00ffaa; font-weight:bold; text-shadow:0 0 10px #00ffaa; }
    main { max-width:900px; margin:30px auto; padding:20px; }
    .models { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:20px; margin:30px 0; }
    .model-card {
        background:#111; border:2px solid #222; border-radius:8px; padding:20px; transition:0.3s;
    }
    .model-card:hover { border-color:#00ffaa; transform:translateY(-5px); }
    .hashrate { font-size:32px; font-weight:bold; color:#00ffaa; }
    button {
        width:100%; padding:14px; background:#00ffaa; color:#000; border:none;
        font-weight:bold; cursor:pointer; border-radius:6px; margin-top:15px;
    }
    button:hover { background:#00dd99; }
    #status { margin:25px 0; padding:18px; background:#1a1a1a; border-radius:8px; min-height:70px; font-size:15px; }
    .active { color:#00ff88; animation:pulse 1.5s infinite; }
    @keyframes pulse { 50% { opacity:0.4; } }
</style>
</head>
<body>

<header>
    <div class="logo">BBC MINER vMax</div>
    <div><a href="index.html" style="color:#888">← Home</a></div>
</header>

<main>
    <h2>Wybierz model koparki vMax</h2>
    <div class="models" id="modelsContainer"></div>
