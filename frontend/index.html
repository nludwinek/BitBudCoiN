<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zielony BBcChain IntegracyjnY</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ====== MOTYW BBC ====== */
:root {
  --bg: #050608;
  --card: #0b0e13;
  --accent: #35ff7a;
  --accent2: #7fffa8;
  --text: #e5f7ea;
  --muted: #9fbfae;
  --border: #1b3b26;
  --flame: #6ecbff;     /* jasno błękitne płomienie */
  --smoke: #35ff7a55;   /* zielony dym */
  --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  margin: 0;
  font-family: var(--font);
  background: radial-gradient(circle at top, #0b1510 0, #050608 45%, #020304 100%);
  color: var(--text);
  overflow-x: hidden;
}

/* ====== ANIMACJE DYM + PŁOMIENIE ====== */
.smoke {
  position: fixed;
  top: -20%;
  left: 0;
  width: 100%;
  height: 140%;
  background: radial-gradient(circle, var(--smoke) 0%, transparent 60%);
  filter: blur(40px);
  animation: smokeMove 18s infinite linear;
  pointer-events: none;
  z-index: -1;
}

@keyframes smokeMove {
  0% { transform: translateX(-20%) translateY(0); }
  50% { transform: translateX(20%) translateY(-10%); }
  100% { transform: translateX(-20%) translateY(0); }
}

.flames {
  position: fixed;
  bottom: -10%;
  left: 0;
  width: 100%;
  height: 40%;
  background: radial-gradient(circle at bottom, var(--flame) 0%, transparent 70%);
  filter: blur(35px);
  animation: flamesPulse 4s infinite ease-in-out;
  pointer-events: none;
  z-index: -1;
}

@keyframes flamesPulse {
  0% { opacity: 0.35; }
  50% { opacity: 0.7; }
  100% { opacity: 0.35; }
}

/* ====== HEADER ====== */
header {
  padding: 1.2rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(5,6,8,0.85);
  backdrop-filter: blur(12px);
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.7rem;
}

.logo-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 20%, var(--accent)
