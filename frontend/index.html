<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BitBudCoin Core</title>

<link rel="icon" href="logo.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#070707;
    color:#f0f0f0;

    font-family:Segoe UI,Arial,sans-serif;

}

header{

    position:sticky;

    top:0;

    background:#111;

    border-bottom:2px solid #00ffaa;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:18px 40px;

    z-index:100;

}

.logo{

    display:flex;

    align-items:center;

    gap:15px;

}

.logo img{

    width:56px;

}

.logo h1{

    color:#00ffaa;

    font-size:30px;

}

nav{

    display:flex;

    gap:18px;

}

nav a{

    color:#ddd;

    text-decoration:none;

    transition:.3s;

}

nav a:hover{

    color:#00ffaa;

}

.hero{

    padding:80px 30px;

    text-align:center;

}

.hero h2{

    color:#00ffaa;

    font-size:54px;

}

.hero p{

    color:#bbb;

    max-width:900px;

    margin:30px auto;

    line-height:1.7;

    font-size:20px;

}

.buttons{

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;

}

.btn{

    padding:15px 30px;

    border-radius:8px;

    text-decoration:none;

    background:#00ffaa;

    color:#000;

    font-weight:bold;

    transition:.3s;

}

.btn:hover{

    transform:translateY(-2px);

    box-shadow:0 0 18px #00ffaa;

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="logo.png">

<h1>BitBudCoin</h1>

</div>

<nav>

<a href="index.html">Home</a>

<a href="explorer.html">Explorer</a>

<a href="wallet.html">Wallet</a>

<a href="miner.html">Miner</a>

<a href="network.html">Network</a>

<a href="stats.html">Stats</a>

</nav>

</header>

<section class="hero">

<h2>BitBudCoin Mainnet</h2>

<p>

Open-source blockchain project focused on a lightweight,
community-driven network with Proof of Work, peer-to-peer
connectivity and a transparent block explorer.

</p>

<div class="buttons">

<a class="btn" href="explorer.html">Open Explorer</a>

<a class="btn" href="wallet.html">Wallet</a>

<a class="btn" href="miner.html">Start Mining</a>

</div>

</section>
