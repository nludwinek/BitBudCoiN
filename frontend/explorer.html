<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>BBC Explorer – informacje o łańcuchu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; font-family:system-ui; background:#050608; color:#e5f7ea; }
    main { max-width:700px; margin:0 auto; padding:1.5rem; }
    h1 { margin:0 0 0.5rem; }
    p { margin:0 0 1rem; color:#7f8b86; }
    .card {
      background:#0b0e13;
      border-radius:16px;
      border:1px solid #202530;
      padding:1.1rem;
      box-shadow:0 18px 40px rgba(0,0,0,0.6);
    }
    .info-list { list-style:none; padding:0; margin:0; font-size:0.9rem; }
    .info-list li {
      display:flex;
      justify-content:space-between;
      padding:0.3rem 0;
      border-bottom:1px dashed rgba(32,37,48,0.7);
    }
    .info-list li span:first-child { color:#7f8b86; }
    .info-list li span:last-child { color:#e5f7ea; font-weight:500; }
    .error { color:#ff4b6b; font-size:0.8rem; margin-top:0.4rem; }
    a.back { display:inline-block; margin-bottom:0.8rem; font-size:0.85rem; color:#35ff7a; text-decoration:none; }
  </style>
</head>
<body>
<main>
  <a href="index.html" class="back">← Powrót do hubu</a>
  <h1>BBC Explorer</h1>
  <p>Podstawowe informacje o łańcuchu BitBudCoiN – wysokość, nagrody, trudność, nazwa sieci.</p>

  <div class="card">
    <ul class="info-list" id="info-list"></ul>
    <div class="error" id="error"></div>
  </div>
</main>

<script>
  const API_BASE = "https://twoj-backend-url"; // PODMIEŃ

  async function loadInfo() {
    const list = document.getElementById("info-list");
    const errorEl = document.getElementById("error");
    list.innerHTML = "";
    errorEl.textContent = "";

    try {
      const res = await fetch(API_BASE + "/info");
      if (!res.ok) throw new Error("Backend niedostępny");
      const data = await res.json();

      const entries = Object.entries(data);
      if (!entries.length) {
        list.innerHTML = "<li><span>Brak danych</span><span>–</span></li>";
        return;
      }

      entries.forEach(([key, value]) => {
        const li = document.createElement("li");
        li.innerHTML = `<span>${key}</span><span>${value}</span>`;
        list.appendChild(li);
      });
    } catch (e) {
      errorEl.textContent = "Nie udało się pobrać informacji o łańcuchu.";
    }
  }

  loadInfo();
</script>
</body>
</html>
