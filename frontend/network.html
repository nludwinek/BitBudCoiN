<body>

<nav class="nav">
    <a href="index.html" class="brand"><img src="assets/logo.svg" alt="BitBudCoin"> BitBudCoin</a>
    <div class="nav-links">
        <a href="index.html" id="nav-index">Start</a>

</nav>

<div class="page">
    <h1 style="margin-top:32px;">Parametry sieci</h1>
    <p>Zdrowie łańcucha i stałe protokołu — to, na czym zgadzają się wszystkie węzły.</p>

    <div class="card">
        <div id="validity-row" style="display:flex; align-items:center; gap:10px; padding-bottom:16px; margin-bottom:16px; border-bottom:1px solid var(--border);">
            <span class="skeleton" style="width:120px; height:20px; display:inline-block;"></span>
        </div>
        <table>
            <tbody id="params-tbody">
                <tr><td colspan="2" class="skeleton">ładowanie ładowanie ładowanie</td></tr>
            </tbody>
        </table>
    </div>
</div>

<footer>BitBudCoin (BbC) · sieć proof-of-work · <a href="docks.html">dokumentacja</a></footer>

<script src="assets/api.js"></script>
<script src="assets/nav.js"></script>
<script>
setActiveNav("nav-network");

function row(label, value) {
    return `<tr><td style="color:var(--text-dim); width:45%;">${label}</td><td>${value}</td></tr>`;
}

async function load() {
    try {
        const info = await apiGet("/info");
        document.getElementById("validity-row").innerHTML = info.isValid
            ? `<span class="flame-pill lit"><span class="flame-dot"></span></span> <strong style="color:var(--leaf)">Łańcuch poprawny</strong>`
            : `<span style="color:var(--danger)">⚠ Łańcuch NIEPOPRAWNY</span>`;

        document.getElementById("params-tbody").innerHTML = [
            row("Sieć", `${info.network} (${info.symbol})`),
            row("Chain ID", info.chainId),
            row("Wersja protokołu", info.version),
            row("Wysokość", "#" + fmtNumber(info.height, 0)),
            row("Trudność bieżąca", fmtNumber(info.difficulty, 0)),
            row("Bloków do przeliczenia trudności", fmtNumber(info.blocksUntilRetarget, 0)),
            row("Bloków do halvingu", fmtNumber(info.blocksUntilHalving, 0)),
            row("Podaż w obiegu", fmtNumber(info.circulatingSupply) + " BbC"),
            row("Pułap podaży", fmtNumber(info.maxSupply) + " BbC"),
            row("Premine", fmtNumber(info.premine) + " BbC"),
        ].join("");
    } catch (e) {
        document.getElementById("validity-row").innerHTML = `<div class="error-banner">Brak połączenia z węzłem: ${escapeHtml(e.message)}</div>`;
        document.getElementById("params-tbody").innerHTML = "";
    }
}
load();
</script>
</body>
</html>
<div class="card">
  <h3>Znani górnicy</h3>
  <div id="minersListBox"></div>
</div>
<script>
(async () => {
  try {
    const miners = await apiGet("/network/miners");
    document.getElementById("minersListBox").innerHTML = miners.length === 0
      ? '<p style="color:var(--text-dim);">Na razie tylko Ty.</p>'
      : miners.map(m => `<div style="padding:8px 0;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:.85rem;">
          ${m.address.slice(0,14)}...${m.address.slice(-6)} · ${m.source === "pool" ? "pula" : "solo"} · ${fmtNumber(m.totalEarned)} BbC · ostatnio blok #${m.lastBlockHeight}
        </div>`).join("");
  } catch (e) {
    document.getElementById("minersListBox").innerHTML = '<p style="color:var(--text-dim);">Niedostępne.</p>';
  }
})();
</script>
